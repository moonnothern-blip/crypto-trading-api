<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Crypto Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: white;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .welcome-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CryptoTrade</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/trading">Trading</a>
            <a href="/wallet">Wallet</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h2>Welcome, <span id="userEmail">User</span>!</h2>
            <p>Your crypto trading dashboard is ready.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Portfolio Value</h3>
                <div class="stat-value">$0.00</div>
            </div>
            <div class="stat-card">
                <h3>24h Change</h3>
                <div class="stat-value">0%</div>
            </div>
            <div class="stat-card">
                <h3>Open Orders</h3>
                <div class="stat-value">0</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';
        const token = localStorage.getItem('token');

        // Check if logged in
        if (!token) {
            window.location.href = '/';
        }

        // Load user data
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/api/dashboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userEmail').textContent = data.user.email;
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        loadDashboard();
    </script>
</body>
</html>
