<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutch Admin - User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        .navbar {
            background: #0f0f1a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h2 { color: white; }
        .logo span { color: #e74c3c; }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 10px;
        }
        .users-table {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }
        th {
            color: #e74c3c;
        }
        .deposit-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        .modal-content button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h2>CLUTCH <span>ADMIN</span></h2>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Balance</h3>
                <div class="stat-value" id="totalBalance">$0</div>
            </div>
        </div>

        <div class="users-table">
            <h3 style="margin-bottom: 20px;">Registered Users</h3>
            <table>
                <thead>
                    <tr><th>Email</th><th>Balance</th><th>Joined</th><th>Action</th></tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3>Add Balance</h3>
            <p id="userEmailDisplay"></p>
            <input type="number" id="depositAmount" placeholder="Amount to add">
            <button onclick="confirmDeposit()">Add Balance</button>
            <button onclick="closeModal()" style="background:#666;">Cancel</button>
        </div>
    </div>

    <script>
        let selectedUserId = null;
        let selectedUserEmail = null;
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';

        function checkAdmin() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin-login';
            }
        }

        async function loadUsers() {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                document.getElementById('totalUsers').textContent = data.totalUsers;
                document.getElementById('totalBalance').textContent = `$${data.totalBalance.toFixed(2)}`;
                
                const tbody = document.getElementById('usersList');
                tbody.innerHTML = '';
                data.users.forEach(user => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.email}</td>
                            <td>$${user.balance.toFixed(2)}</td>
                            <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="deposit-btn" onclick="openDepositModal('${user.id}', '${user.email}')">Add Balance</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function openDepositModal(userId, userEmail) {
            selectedUserId = userId;
            selectedUserEmail = userEmail;
            document.getElementById('userEmailDisplay').innerText = `User: ${userEmail}`;
            document.getElementById('depositModal').style.display = 'flex';
        }

        async function confirmDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_URL}/api/admin/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId: selectedUserId, amount })
                });
                
                if (response.ok) {
                    alert(`Added $${amount} to ${selectedUserEmail}`);
                    closeModal();
                    loadUsers();
                } else {
                    alert('Failed to add balance');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        function closeModal() {
            document.getElementById('depositModal').style.display = 'none';
            document.getElementById('depositAmount').value = '';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin-login';
        }

        checkAdmin();
        loadUsers();
    </script>
</body>
</html>
