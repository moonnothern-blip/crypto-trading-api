<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Crypto Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
        }

        .navbar {
            background: #16213e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-top: 10px;
        }

        .users-table {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }

        th {
            color: #667eea;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .status-active {
            background: #4caf50;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 4px;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: black;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CryptoTrade ADMIN</div>
        <button onclick="logout()" style="background:#dc3545; color:white; padding:8px 16px; border:none; border-radius:5px; cursor:pointer;">Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Today</h3>
                <div class="stat-value" id="activeUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Volume</h3>
                <div class="stat-value" id="totalVolume">$0</div>
            </div>
            <div class="stat-card">
                <h3>Pending KYC</h3>
                <div class="stat-value" id="pendingKYC">0</div>
            </div>
        </div>

        <div class="users-table">
            <h2 style="margin-bottom: 20px;">Registered Users</h2>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Joined</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr>
                        <td colspan="4">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/';
        }

        async function loadAdminData() {
            try {
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayUsers(data.users);
                    updateStats(data);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayUsers(users) {
            const tbody = document.getElementById('usersList');
            
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No users found</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.email}</td>
                    <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                    <td><span class="status-badge status-active">Active</span></td>
                    <td>
                        <button class="btn btn-warning" onclick="viewUser('${user.id}')">View</button>
                        <button class="btn btn-danger" onclick="suspendUser('${user.id}')">Suspend</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(data) {
            document.getElementById('totalUsers').textContent = data.totalUsers || 0;
            document.getElementById('activeUsers').textContent = data.activeUsers || 0;
            document.getElementById('totalVolume').textContent = `$${data.totalVolume || 0}`;
            document.getElementById('pendingKYC').textContent = data.pendingKYC || 0;
        }

        function viewUser(userId) {
            alert('User details feature coming soon!');
        }

        function suspendUser(userId) {
            if (confirm('Suspend this user?')) {
                alert('User suspended (demo)');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        loadAdminData();
    </script>
</body>
</html>
