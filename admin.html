<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { 
            font-family: Arial; 
            background: #1a1a2e; 
            color: white; 
            padding: 20px; 
        }
        h1 { color: #667eea; }
        table { 
            width: 100%; 
            background: #16213e; 
            border-radius: 10px; 
            padding: 20px;
            margin-top: 20px;
        }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #2a2a3e;
        }
        th { color: #667eea; }
        .logout-btn {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <div id="users"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/';
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                let html = '<h2>Registered Users</h2><table><tr><th>Email</th><th>Joined</th></tr>';
                data.users.forEach(user => {
                    html += `<tr><td>${user.email}</td><td>${new Date(user.createdAt).toLocaleDateString()}</td></tr>`;
                });
                html += '</table>';
                document.getElementById('users').innerHTML = html;
            } catch (error) {
                document.getElementById('users').innerHTML = '<p>Error loading users</p>';
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
        
        loadUsers();
    </script>
</body>
</html>
