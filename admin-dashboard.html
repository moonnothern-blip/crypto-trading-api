<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clutch Admin - Full Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        .navbar {
            background: #0f0f1a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h2 { color: white; }
        .logo span { color: #e74c3c; }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 10px;
        }
        .users-table {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }
        th {
            color: #e74c3c;
        }
        .btn {
            padding: 5px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
        }
        .btn-deposit { background: #28a745; color: white; }
        .btn-remove { background: #dc3545; color: white; }
        .btn-limit { background: #ffc107; color: black; }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
        }
        .modal-content h3 {
            margin-bottom: 20px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        .modal-content button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-confirm { background: #28a745; color: white; }
        .btn-cancel { background: #666; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h2>CLUTCH <span>ADMIN</span></h2>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Balance</h3>
                <div class="stat-value" id="totalBalance">$0</div>
            </div>
        </div>

        <div class="users-table">
            <h3 style="margin-bottom: 20px;">User Management</h3>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Balance</th>
                        <th>Withdraw Limit</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3>Add Balance</h3>
            <p id="depositUserEmail"></p>
            <input type="number" id="depositAmount" placeholder="Amount to add">
            <button class="btn-confirm" onclick="confirmDeposit()">Add Balance</button>
            <button class="btn-cancel" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <!-- Remove Balance Modal -->
    <div id="removeModal" class="modal">
        <div class="modal-content">
            <h3>Remove Balance</h3>
            <p id="removeUserEmail"></p>
            <input type="number" id="removeAmount" placeholder="Amount to remove">
            <button class="btn-confirm" onclick="confirmRemove()">Remove Balance</button>
            <button class="btn-cancel" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <!-- Update Limit Modal -->
    <div id="limitModal" class="modal">
        <div class="modal-content">
            <h3>Update Withdrawal Limit</h3>
            <p id="limitUserEmail"></p>
            <input type="number" id="limitAmount" placeholder="New withdrawal limit">
            <button class="btn-confirm" onclick="confirmUpdateLimit()">Update Limit</button>
            <button class="btn-cancel" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <script>
        let selectedUserId = null;
        let selectedUserEmail = null;
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';

        function checkAdmin() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin-login';
            }
        }

        async function loadUsers() {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                document.getElementById('totalUsers').textContent = data.totalUsers;
                document.getElementById('totalBalance').textContent = `$${data.totalBalance.toFixed(2)}`;
                
                const tbody = document.getElementById('usersList');
                tbody.innerHTML = '';
                data.users.forEach(user => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.email}</td>
                            <td>$${user.balance.toFixed(2)}</td>
                            <td>$${user.withdrawLimit.toFixed(2)}</td>
                            <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-deposit" onclick="openDepositModal('${user.id}', '${user.email}')">+ Add</button>
                                <button class="btn btn-remove" onclick="openRemoveModal('${user.id}', '${user.email}')">- Remove</button>
                                <button class="btn btn-limit" onclick="openLimitModal('${user.id}', '${user.email}')">Limit</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Deposit Modal
        function openDepositModal(userId, userEmail) {
            selectedUserId = userId;
            selectedUserEmail = userEmail;
            document.getElementById('depositUserEmail').innerText = `User: ${userEmail}`;
            document.getElementById('depositModal').style.display = 'flex';
        }

        async function confirmDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_URL}/api/admin/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId: selectedUserId, amount })
                });
                
                if (response.ok) {
                    alert(`Added $${amount} to ${selectedUserEmail}`);
                    closeModals();
                    loadUsers();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to add balance');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        // Remove Balance Modal
        function openRemoveModal(userId, userEmail) {
            selectedUserId = userId;
            selectedUserEmail = userEmail;
            document.getElementById('removeUserEmail').innerText = `User: ${userEmail}`;
            document.getElementById('removeModal').style.display = 'flex';
        }

        async function confirmRemove() {
            const amount = parseFloat(document.getElementById('removeAmount').value);
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_URL}/api/admin/remove-balance`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId: selectedUserId, amount })
                });
                
                if (response.ok) {
                    alert(`Removed $${amount} from ${selectedUserEmail}`);
                    closeModals();
                    loadUsers();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to remove balance');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        // Update Limit Modal
        function openLimitModal(userId, userEmail) {
            selectedUserId = userId;
            selectedUserEmail = userEmail;
            document.getElementById('limitUserEmail').innerText = `User: ${userEmail}`;
            document.getElementById('limitModal').style.display = 'flex';
        }

        async function confirmUpdateLimit() {
            const newLimit = parseFloat(document.getElementById('limitAmount').value);
            
            if (!newLimit || newLimit < 0) {
                alert('Please enter a valid limit amount');
                return;
            }
            
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`${API_URL}/api/admin/update-limit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId: selectedUserId, newLimit })
                });
                
                if (response.ok) {
                    alert(`Withdrawal limit for ${selectedUserEmail} updated to $${newLimit}`);
                    closeModals();
                    loadUsers();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to update limit');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        function closeModals() {
            document.getElementById('depositModal').style.display = 'none';
            document.getElementById('removeModal').style.display = 'none';
            document.getElementById('limitModal').style.display = 'none';
            document.getElementById('depositAmount').value = '';
            document.getElementById('removeAmount').value = '';
            document.getElementById('limitAmount').value = '';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin-login';
        }

        checkAdmin();
        loadUsers();
    </script>
</body>
</html>
