<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumble Admin - User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        .navbar {
            background: #0f0f1a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h2 { color: white; }
        .logo span { color: #e74c3c; }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 10px;
        }
        .users-table {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }
        th {
            color: #e74c3c;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h2>RUMBLE <span>ADMIN</span></h2>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Volume</h3>
                <div class="stat-value" id="totalVolume">$0</div>
            </div>
            <div class="stat-card">
                <h3>Active Today</h3>
                <div class="stat-value" id="activeUsers">0</div>
            </div>
        </div>

        <div class="users-table">
            <h3 style="margin-bottom: 20px;">Registered Users</h3>
            <table>
                <thead>
                    <tr><th>Email</th><th>Joined Date</th><th>Status</th><th>Action</th</tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>

    <script>
        function checkAdmin() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin-login';
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch('https://crypto-trading-api-h6uc.onrender.com/api/admin/users');
                const data = await response.json();
                
                document.getElementById('totalUsers').textContent = data.users.length;
                document.getElementById('totalVolume').textContent = '$0';
                document.getElementById('activeUsers').textContent = data.users.length;
                
                const tbody = document.getElementById('usersList');
                tbody.innerHTML = '';
                data.users.forEach(user => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.email}</td>
                            <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                            <td>Active</td>
                            <td><button class="btn-danger" onclick="suspendUser('${user.id}')">Suspend</button></td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function suspendUser(userId) {
            if (confirm('Suspend this user?')) {
                alert('User suspended (demo)');
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin-login';
        }

        checkAdmin();
        loadUsers();
    </script>
</body>
</html>
