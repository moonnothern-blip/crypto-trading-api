<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Clutch Incorporated</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #1a1a2e;
        }
        .logo span {
            color: #e74c3c;
            font-size: 12px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #c0392b;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }
        .info {
            color: #17a2b8;
            text-align: center;
            margin-top: 10px;
        }
        .otp-section {
            display: none;
            margin-top: 15px;
        }
        .back-btn {
            background: #6c757d;
            margin-top: 5px;
        }
        .back-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>CLUTCH</h1>
            <span>ADMIN PORTAL</span>
        </div>
        
        <!-- Step 1: Email Section -->
        <div id="emailSection">
            <input type="email" id="adminEmail" placeholder="Admin Email" value="jkkevin00@gmail.com">
            <button onclick="sendOTP()">Send Verification Code</button>
            <div id="emailMessage" class="error"></div>
        </div>

        <!-- Step 2: OTP Section (hidden initially) -->
        <div id="otpSection" class="otp-section">
            <input type="text" id="otpCode" placeholder="Enter 6-digit OTP">
            <button onclick="verifyOTP()">Verify & Login</button>
            <button class="back-btn" onclick="backToEmail()">← Back</button>
            <div id="otpMessage" class="error"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';
        let adminEmail = '';

        async function sendOTP() {
            const email = document.getElementById('adminEmail').value;
            const emailMessage = document.getElementById('emailMessage');
            
            if (!email) {
                emailMessage.innerText = 'Please enter your admin email';
                return;
            }
            
            adminEmail = email;
            emailMessage.innerText = 'Sending verification code...';
            emailMessage.className = 'info';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    emailMessage.innerText = '✅ OTP sent to your email!';
                    emailMessage.className = 'success';
                    document.getElementById('emailSection').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                } else {
                    emailMessage.innerText = data.message || 'Failed to send OTP';
                    emailMessage.className = 'error';
                }
            } catch (error) {
                emailMessage.innerText = 'Network error. Please try again.';
                emailMessage.className = 'error';
            }
        }
        
        async function verifyOTP() {
            const otp = document.getElementById('otpCode').value;
            const otpMessage = document.getElementById('otpMessage');
            
            if (!otp || otp.length !== 6) {
                otpMessage.innerText = 'Please enter the 6-digit OTP';
                return;
            }
            
            otpMessage.innerText = 'Verifying...';
            otpMessage.className = 'info';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: adminEmail, otp })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('adminToken', data.token);
                    otpMessage.innerText = 'Login successful! Redirecting...';
                    otpMessage.className = 'success';
                    setTimeout(() => {
                        window.location.href = '/admin-dashboard';
                    }, 1500);
                } else {
                    otpMessage.innerText = data.message || 'Invalid OTP';
                    otpMessage.className = 'error';
                }
            } catch (error) {
                otpMessage.innerText = 'Network error. Please try again.';
                otpMessage.className = 'error';
            }
        }
        
        function backToEmail() {
            document.getElementById('emailSection').style.display = 'block';
            document.getElementById('otpSection').style.display = 'none';
            document.getElementById('otpCode').value = '';
            document.getElementById('emailMessage').innerText = '';
            document.getElementById('otpMessage').innerText = '';
        }
    </script>
</body>
</html>
