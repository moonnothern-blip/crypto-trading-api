<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Clutch Incorporated</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #1a1a2e;
        }
        .logo span {
            color: #e74c3c;
            font-size: 12px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #c0392b;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }
        .setup-section {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .secret-key {
            background: #1a1a2e;
            color: #e74c3c;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            word-break: break-all;
            margin: 15px 0;
        }
        .copy-btn {
            background: #28a745;
            margin-top: 5px;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>CLUTCH</h1>
            <span>ADMIN PORTAL</span>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <input type="email" id="adminEmail" placeholder="Admin Email" value="jkkevin00@gmail.com">
            <input type="password" id="adminPassword" placeholder="Password">
            <input type="text" id="twoFactorCode" placeholder="Google Authenticator Code">
            <button onclick="adminLogin()">Login</button>
            <div id="loginMessage" class="error"></div>
        </div>

        <!-- 2FA Setup Section -->
        <div id="setupSection" class="setup-section">
            <h3 style="margin-bottom: 10px;">Setup Google Authenticator</h3>
            <p>Add this secret key to Google Authenticator:</p>
            <div id="secretKeyDisplay" class="secret-key">Loading...</div>
            <button class="copy-btn" onclick="copySecret()">Copy Secret Key</button>
            <p style="font-size: 12px; margin-top: 10px;">Steps:</p>
            <ol style="font-size: 11px; color: #666; margin-left: 20px;">
                <li>Open Google Authenticator app</li>
                <li>Tap "+" → "Enter a setup key"</li>
                <li>Account name: <strong>ClutchAdmin</strong></li>
                <li>Key: Paste the secret key above</li>
                <li>Type: Time-based (TOTP)</li>
                <li>Tap "Add"</li>
            </ol>
            <button onclick="enable2FA()" style="background:#28a745; margin-top: 15px;">I've Added the Key → Continue</button>
            <button onclick="hideSetup()" style="background:#6c757d;">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';
        let twoFactorSecret = null;

        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const twoFactorCode = document.getElementById('twoFactorCode').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!email || !password || !twoFactorCode) {
                messageDiv.innerText = 'Please fill all fields';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, twoFactorCode })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('adminToken', data.token);
                    messageDiv.className = 'success';
                    messageDiv.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/admin-dashboard';
                    }, 1500);
                } else {
                    if (data.message === '2FA not set up') {
                        setup2FA(email);
                    } else {
                        messageDiv.innerText = data.message || 'Login failed';
                    }
                }
            } catch (error) {
                messageDiv.innerText = 'Network error';
            }
        }

        async function setup2FA(email) {
            try {
                const response = await fetch(`${API_URL}/api/admin/setup-2fa?email=${email}`);
                const data = await response.json();
                
                twoFactorSecret = data.secret;
                document.getElementById('secretKeyDisplay').innerHTML = twoFactorSecret;
                document.getElementById('setupSection').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            } catch (error) {
                alert('Failed to setup 2FA');
            }
        }

        function copySecret() {
            navigator.clipboard.writeText(twoFactorSecret);
            alert('Secret key copied! Paste it in Google Authenticator');
        }

        async function enable2FA() {
            const email = document.getElementById('adminEmail').value;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/save-2fa-secret`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, secret: twoFactorSecret })
                });
                
                if (response.ok) {
                    alert('2FA enabled! Now login with Google Authenticator code');
                    document.getElementById('setupSection').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('twoFactorCode').value = '';
                }
            } catch (error) {
                alert('Failed to enable 2FA');
            }
        }

        function hideSetup() {
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
    </script>
</body>
</html>
