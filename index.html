<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumble Incorporated - Crypto Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #1a1a2e;
        }

        .logo span {
            color: #e74c3c;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .logo .inc {
            font-size: 12px;
            color: #666;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #e74c3c;
        }

        .checkbox-group {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .legal {
            margin: 20px 0;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .legal a {
            color: #e74c3c;
            text-decoration: none;
            margin: 0 5px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #e74c3c;
            text-decoration: none;
            font-weight: bold;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>RUMBLE</h1>
            <span>INCORPORATED</span>
        </div>
        
        <div id="loginForm">
            <h2>Sign in</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberPassword">
                <label>Remember password</label>
            </div>
            <div class="legal">
                Login indicates agreement
                <a href="#">Service Terms</a>,
                <a href="#">Privacy Policy</a>,
                <a href="#">Anti Money Laundering Protocol</a>
            </div>
            <button onclick="login()">Sign in</button>
            <div class="register-link">
                No account? <a href="#" onclick="showRegister()">Register</a>
            </div>
            <div id="message" class="message"></div>
        </div>

        <div id="registerForm" style="display:none;">
            <h2>Create Account</h2>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password" required>
            </div>
            <div class="input-group">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
            </div>
            <button onclick="register()">Create Account</button>
            <div class="register-link">
                Already have an account? <a href="#" onclick="showLogin()">Sign in</a>
            </div>
            <div id="regMessage" class="message"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://crypto-trading-api-h6uc.onrender.com';

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberPassword').checked;
            const messageDiv = document.getElementById('message');

            if (!email || !password) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Please enter your email and password';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    }
                    messageDiv.className = 'message success';
                    messageDiv.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerText = data.message || 'Invalid credentials';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Network error. Please try again.';
            }
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const messageDiv = document.getElementById('regMessage');

            if (!email || !password || !confirm) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Please fill all fields';
                return;
            }

            if (password !== confirm) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Passwords do not match';
                return;
            }

            if (password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Password must be at least 6 characters';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    messageDiv.className = 'message success';
                    messageDiv.innerText = 'Account created! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerText = data.message || 'Registration failed';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerText = 'Network error. Please try again.';
            }
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        // Load remembered email
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('rememberPassword').checked = true;
        }
    </script>
</body>
</html>
